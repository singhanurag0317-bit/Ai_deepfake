# ═══════════════════════════════════════════════════════════════
# DeepScan — Docker Compose (Production)
# Starts: Frontend (Nginx) + Backend (Node.js) + MongoDB
#
# Usage:
#   docker compose up --build        (foreground)
#   docker compose up --build -d     (background)
#   docker compose down              (stop all)
#   docker compose down -v           (stop + delete data)
#
# URLs:
#   Frontend → http://localhost:3000
#   Backend  → http://localhost:5000
#   MongoDB  → mongodb://localhost:27017
# ═══════════════════════════════════════════════════════════════

services:
  # ── MongoDB ──────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: deepscan-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./deepscan-backend
      dockerfile: Dockerfile
    container_name: deepscan-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/deepscan
      - CORS_ORIGIN=http://localhost:3000,http://localhost:3001
      - FLASK_ML_URL=http://ml-service:5001
    depends_on:
      mongo:
        condition: service_healthy
      ml-service:
        condition: service_started
    volumes:
      - backend_uploads:/app/uploads

  # ── Frontend (Nginx) ────────────────────────────────────────
  frontend:
    build:
      context: ./deepscan-frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: http://localhost:5000
    container_name: deepscan-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── Python ML Inference Service ──────────────────────────────
  ml-service:
    build:
      context: ./deepscan-backend/ml_service
      dockerfile: Dockerfile
    container_name: deepscan-ml-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./deepscan-backend/trained_models:/app/trained_models
      - backend_uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

# ── Persistent Volumes ─────────────────────────────────────────
# mongo_data: preserves database across container restarts
# backend_uploads: preserves uploaded files
volumes:
  mongo_data:
  backend_uploads:
