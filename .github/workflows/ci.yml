# ═══════════════════════════════════════════════════════════════
# DeepScan CI/CD Pipeline — GitHub Actions
# ═══════════════════════════════════════════════════════════════
#
# Trigger: Push or PR to main branch
#
# Pipeline:
#   1. Backend:  npm ci → test    (parallel with frontend)
#   2. Frontend: npm ci → build   (parallel with backend)
#   3. Docker:   build images → push to GHCR (only on main push)
#
# Required GitHub Secrets (for production API URL):
#   REACT_APP_API_BASE_URL — optional, defaults to http://localhost:5000
# ═══════════════════════════════════════════════════════════════

name: DeepScan CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ═════════════════════════════════════════════════════════════
  # Job 1: Backend — Install, Lint, Test
  # ═════════════════════════════════════════════════════════════
  backend-test:
    name: 🔬 Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deepscan-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: deepscan-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          MONGODB_URI: mongodb://localhost:27017/deepscan_test
          PORT: 5000

  # ═════════════════════════════════════════════════════════════
  # Job 2: Frontend — Install, Build
  # ═════════════════════════════════════════════════════════════
  frontend-test:
    name: 🎨 Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deepscan-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: deepscan-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          REACT_APP_API_BASE_URL: http://localhost:5000
          CI: true

  # ═════════════════════════════════════════════════════════════
  # Job 3: Build & Push Docker Images to GHCR
  # Only runs on push to main (not on PRs)
  # ═════════════════════════════════════════════════════════════
  docker-build:
    name: 🐳 Build & Push Docker Images
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & Push Backend Image ───────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./deepscan-backend
          file: ./deepscan-backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & Push Frontend Image ──────────────────────────
      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./deepscan-frontend
          file: ./deepscan-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            REACT_APP_API_BASE_URL=${{ secrets.REACT_APP_API_BASE_URL || 'http://localhost:5000' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
